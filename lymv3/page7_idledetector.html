<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Idle Detector</title>
<style>
body{margin:0;min-height:100vh;background:#020617;color:#e2e8f0;font-family:Inter,system-ui,sans-serif;display:grid;place-items:center;padding:24px}
.wrap{text-align:center;width:min(900px,95vw)}
.radar{width:min(380px,70vw);height:min(380px,70vw);margin:10px auto 24px;border-radius:50%;position:relative;border:2px solid rgba(56,189,248,.22);background:radial-gradient(circle, rgba(56,189,248,.08), transparent 60%)}
.radar:before,.radar:after{content:'';position:absolute;inset:50% auto auto 50%;background:rgba(56,189,248,.2)}
.radar:before{width:2px;height:100%;transform:translateX(-50%) translateY(-50%)}
.radar:after{height:2px;width:100%;transform:translateX(-50%) translateY(-50%)}
.sweep{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg, rgba(34,197,94,.45), transparent 25%);animation:spin 2.6s linear infinite}
.blip{position:absolute;width:14px;height:14px;border-radius:50%;background:#22c55e;left:62%;top:36%;box-shadow:0 0 12px #22c55e;animation:blink 1.4s infinite}
@keyframes spin{to{transform:rotate(360deg)}} @keyframes blink{50%{opacity:.25}}
h1{font-size:clamp(2rem,4vw,3.4rem);margin:0 0 10px}
p{line-height:1.7;color:#cbd5e1}
.box{padding:18px;border-radius:18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08)}
</style></head><body><div class="wrap">
<div class="radar"><div class="sweep"></div><div class="blip"></div></div>
<h1>Idle Detector</h1>
<div class="box">
  <p id="msg"></p>
  <p></p>
</div>
</div>
<script>

function getTargetName() {
  return localStorage.getItem('lock_prank_name') || 'there';
}

const name = getTargetName();
document.getElementById('msg').innerHTML = `Presence scan complete. Workstation found unlocked. <strong>Hey ${name}, please don't forget to lock your computer next time.</strong>`;
</script></body></html>
