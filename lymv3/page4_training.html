<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Training Module</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#0f172a,#111827);font-family:Inter,system-ui,sans-serif;color:#f8fafc;padding:24px}
.card{width:min(900px,94vw);padding:30px;border-radius:28px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08)}
h1{margin:0 0 10px;font-size:clamp(2rem,4vw,3.4rem)}
.layout{display:grid;grid-template-columns:280px 1fr;gap:24px;align-items:center}
@media(max-width:840px){.layout{grid-template-columns:1fr}}
.ring{width:240px;height:240px;border-radius:50%;background:conic-gradient(#22c55e calc(var(--p)*1%), rgba(255,255,255,.08) 0);display:grid;place-items:center;margin:auto}
.inner{width:180px;height:180px;border-radius:50%;background:#111827;display:grid;place-items:center;font-size:2rem;font-weight:800}
.line{padding:14px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.note{margin-top:18px;padding:16px;border-radius:18px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.18)}
</style></head><body><div class="card">
<h1>Security Awareness Micro-Training</h1>
<div class="layout">
  <div class="ring" id="ring" style="--p:0"><div class="inner" id="pct">0%</div></div>
  <div>
    <div class="line"><strong>Module:</strong> Leaving your desk without locking</div>
    <div class="line"><strong>Status:</strong> educational mode enabled</div>
    <div class="line"><strong>Outcome:</strong> no harm done, but lesson available</div>
    <div class="note" id="note"></div>
  </div>
</div>
</div>
<script>

function getTargetName() {
  return localStorage.getItem('lock_prank_name') || 'there';
}

const name = getTargetName();
document.getElementById('note').innerHTML = `<strong>Completion advice:</strong> Hey ${name}, please don't forget to lock your computer next time.`;
let n=0; const el=document.getElementById('pct'); const ring=document.getElementById('ring');
const timer = setInterval(() => { n += 4; if(n>100) n=100; el.textContent = n + '%'; ring.style.setProperty('--p', n); if(n>=100) clearInterval(timer); }, 80);
</script></body></html>
